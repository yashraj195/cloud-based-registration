<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Study Group Membership Drive</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Navigation -->

    <nav>

        <div class="logo">

            Study Group

        </div>

        <ul>

            <li><a href="#">Home</a></li>

            <li><a href="#">About</a></li>

            <li><a href="#">Events</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

    </nav>


    <!-- Hero -->

    <section class="hero">

        <h1>

            Join Our Study Group

        </h1>

        <p>

            Learn • Build • Collaborate • Grow Together

        </p>

    </section>


    <!-- Form -->

    <section class="container">

        <div class="card">

            <h2>Membership Registration</h2>

            <p>

                Fill in the details below to become a member.

            </p>

            <form id="membershipForm">

                <div class="row">

                    <div class="input-group">

                        <label>Full Name</label>

                        <input
                            type="text"
                            id="name"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <label>Registration Number</label>

                        <input
                            type="text"
                            id="registration"
                            required
                        >

                    </div>

                </div>

                <div class="row">

                    <div class="input-group">

                        <label>Email</label>

                        <input
                            type="email"
                            id="email"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <label>Phone Number</label>

                        <input
                            type="tel"
                            id="phone"
                            required
                        >

                    </div>

                </div>

                <div class="row">

                    <div class="input-group">

                        <label>Department</label>

                        <input
                            type="text"
                            id="department"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <label>Year</label>

                        <select id="year">

                            <option>1st Year</option>
                            <option>2nd Year</option>
                            <option>3rd Year</option>
                            <option>4th Year</option>

                        </select>

                    </div>

                </div>

                <div class="input-group">

                    <label>Skills</label>

                    <input
                        type="text"
                        id="skills"
                        placeholder="Python, Java, React..."
                    >

                </div>

                <div class="input-group">

                    <label>Why do you want to join?</label>

                    <textarea
                        id="reason"
                        rows="5"
                    ></textarea>

                </div>

                <button
                    type="submit"
                    id="submitBtn"
                >

                    Join Study Group

                </button>

            </form>

        </div>

    </section>


    <!-- Footer -->

    <footer>

        © 2026 Study Group • Built with Azure Serverless

    </footer>

    <script src="script.js"></script>

</body>
</html>
